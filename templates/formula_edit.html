{% extends "base.html" %}
{% block content %}
<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
  <a href="/formulas" style="color:#888;text-decoration:none;font-size:.9rem">← Все формулы</a>
</div>

<div class="card" style="margin-bottom:1.5rem">
  <h2 style="margin-bottom:1rem">✏️ Редактировать формулу</h2>
  <table style="width:auto;margin-bottom:1rem">
    <tr>
      <td style="color:#888;padding:.3rem .8rem .3rem 0">ID формулы</td>
      <td><strong>{{ formula.id }}</strong></td>
    </tr>
    <tr>
      <td style="color:#888;padding:.3rem .8rem .3rem 0">Клиент</td>
      <td><a href="/clients/{{ formula.client_id }}" style="color:#2d2d2d">{{ formula.client_name }}</a></td>
    </tr>
    <tr>
      <td style="color:#888;padding:.3rem .8rem .3rem 0">Название</td>
      <td><strong>{{ formula.title }}</strong></td>
    </tr>
  </table>

  <form method="post">
    <div class="form-group">
      <label>Состав формулы (обновить):</label>
      <textarea name="content" required>{{ formula.content }}</textarea>
    </div>
    <button class="btn btn-primary" type="submit">✅ Сохранить</button>
    <a href="/formulas" class="btn btn-primary" style="background:#888">❌ Отмена</a>
  </form>
</div>
{% endblock %}
