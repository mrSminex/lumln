<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LUM'N — Панель управления</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #faf9f7; color: #2d2d2d; min-height: 100vh; }
  header { background: #2d2d2d; color: #f5e6d3; padding: 1rem 2rem;
           display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .05em; }
  header span { font-size: .85rem; opacity: .7; }
  nav { background: #f5e6d3; padding: .5rem 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
  nav a { text-decoration: none; color: #2d2d2d; font-size: .9rem; padding: .4rem .8rem;
          border-radius: 6px; transition: background .2s; }
  nav a:hover, nav a.active { background: #2d2d2d; color: #f5e6d3; }
  main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
  h2 { font-size: 1.3rem; margin-bottom: 1.2rem; color: #2d2d2d; }
  .card { background: white; border-radius: 10px; padding: 1.5rem;
          box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th { text-align: left; padding: .6rem .8rem; background: #f5e6d3;
       font-weight: 600; font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: .6rem .8rem; border-bottom: 1px solid #f0ede8; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #faf9f7; }
  input, textarea, select { width: 100%; padding: .6rem .8rem; border: 1px solid #ddd;
    border-radius: 6px; font-size: .9rem; font-family: inherit; }
  textarea { min-height: 120px; resize: vertical; }
  .btn { display: inline-block; padding: .6rem 1.4rem; border-radius: 6px; border: none;
         cursor: pointer; font-size: .9rem; font-family: inherit; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #2d2d2d; color: white; }
  .btn-danger  { background: #c0392b; color: white; }
  .btn-sm { padding: .3rem .7rem; font-size: .8rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; }
  .badge { display: inline-block; padding: .2rem .5rem; border-radius: 4px; font-size: .75rem; }
  .badge-green { background: #e8f5e9; color: #2e7d32; }
  .search-bar { display: flex; gap: .5rem; margin-bottom: 1.2rem; }
  .search-bar input { flex: 1; }
  .alert { padding: .8rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .9rem; }
  .alert-success { background: #e8f5e9; color: #2e7d32; }
  .alert-error   { background: #fdecea; color: #c0392b; }
  .stat { text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 700; color: #2d2d2d; }
  .stat-label { font-size: .8rem; color: #888; margin-top: .2rem; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .nav-export { background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: 600; }
  .nav-export:hover { background: #c8e6c9 !important; }
  .nav-export--full { background: #e3f2fd !important; color: #1565c0 !important; }
  .nav-export--full:hover { background: #bbdefb !important; }
</style>
</head>
<body>
<header>
  <h1>LUM'N ✦ Панель управления</h1>
  <span>Студия персонального парфюма</span>
</header>
<nav>
  <a href="/" {% if active == 'home' %}class="active"{% endif %}>Главная</a>
  <a href="/clients" {% if active == 'clients' %}class="active"{% endif %}>Клиенты</a>
  <a href="/formulas" {% if active == 'formulas' %}class="active"{% endif %}>Формулы</a>
  <a href="/broadcast" {% if active == 'broadcast' %}class="active"{% endif %}>Рассылка</a>
  <a href="/backup" {% if active == 'backup' %}class="active"{% endif %}>Бэкапы</a>
  <a href="/export/clients"  class="nav-export" title="Скачать список клиентов (Excel)">⬇ Клиенты</a>
  <a href="/export/formulas" class="nav-export" title="Скачать все формулы (Excel)">⬇ Формулы</a>
  <a href="/export/full"     class="nav-export nav-export--full" title="Клиенты + Формулы одним файлом">⬇ Всё</a>
  <a href="/logout">Выйти</a>
</nav>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
