{% extends "base.html" %}
{% block content %}
<h2>✉️ Написать клиенту</h2>

{% if msg %}
<div class="alert alert-success">{{ msg }}</div>
{% endif %}

<div class="card">
  <form method="post">
    <div class="form-group">
      <label>Выберите клиента:</label>
      <select name="client_id" required style="width:100%;padding:.6rem .8rem;border:1px solid #ddd;border-radius:6px;font-size:.9rem">
        <option value="">-- Выберите клиента --</option>
        {% for c in clients %}
        <option value="{{ c.id }}">{{ c.name }} ({{ c.phone }}) - #{{ c.id }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Текст сообщения (поддерживается HTML):</label>
      <textarea name="message" required></textarea>
    </div>
    <button class="btn btn-primary" type="submit">✉️ Отправить</button>
  </form>
</div>
{% endblock %}
